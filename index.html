<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>產業龍頭儀表板 — 台股 × 全球整合</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;background:#f5f7fa;color:#222;line-height:1.5}
header{background:linear-gradient(135deg,#00b894,#0984e3);color:white;padding:18px 24px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
header h1{font-size:22px;font-weight:600}
header .sub{font-size:13px;opacity:.85;margin-top:4px}
.stats{display:flex;gap:20px;padding:14px 24px;background:white;border-bottom:1px solid #e5e9f0;flex-wrap:wrap}
.stat{display:flex;flex-direction:column}
.stat .v{font-size:20px;font-weight:600;color:#0984e3}
.stat .l{font-size:11px;color:#7a869a;letter-spacing:.5px}
.heatmap-wrap{background:white;border-bottom:1px solid #e5e9f0;padding:10px 16px}
.hm-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.hm-title{font-size:13px;font-weight:600;color:#444}
.hm-period,.hm-group{display:flex;gap:3px}
.hm-period button,.hm-group button{padding:4px 10px;border:1px solid #d0d7de;border-radius:4px;background:white;cursor:pointer;font-size:12px;font-weight:500;color:#444}
.hm-period button.on{background:#0984e3;color:white;border-color:#0984e3}
.hm-group button.on{background:#00b894;color:white;border-color:#00b894}
.hm-period button:hover:not(.on),.hm-group button:hover:not(.on){background:#f0f3f6}
.hm-toggle{margin-left:auto;cursor:pointer;color:#7a869a;font-size:12px;user-select:none;padding:3px 8px;border-radius:4px}
.hm-toggle:hover{background:#f0f3f6}
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:3px;max-height:300px;overflow-y:auto}
.heatmap.collapsed{display:none}
.tile{padding:8px 10px;border-radius:4px;cursor:pointer;transition:all .1s;display:flex;flex-direction:column;gap:1px;border:1px solid transparent}
.tile:hover{transform:scale(1.04);z-index:5;box-shadow:0 3px 10px rgba(0,0,0,.15);border-color:rgba(0,0,0,.2)}
.tile-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile-val{font-size:14px;font-weight:700;font-family:ui-monospace,Menlo,monospace}
.tile-meta{font-size:9px;opacity:.75}
.tile.pos{background:#d1fae5;color:#065f46}
.tile.posL{background:#86efac;color:#064e3b}
.tile.posXL{background:#22c55e;color:white}
.tile.neg{background:#fee2e2;color:#991b1b}
.tile.negL{background:#fca5a5;color:#7f1d1d}
.tile.negXL{background:#ef4444;color:white}
.tile.flat{background:#f0f3f6;color:#444}
.tile.na{background:#fafbfc;color:#cbd5e1}
.filters{padding:12px 24px;background:white;border-bottom:1px solid #e5e9f0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10}
.filters input,.filters select,.filters button{padding:7px 12px;border:1px solid #d0d7de;border-radius:6px;font-size:13px;font-family:inherit;background:white}
.filters input{min-width:240px}
.filters input:focus,.filters select:focus{outline:2px solid #00b894;border-color:#00b894}
.filters button{cursor:pointer;background:white;color:#444}
.filters button.on{background:#00b894;color:white;border-color:#00b894}
.filters .count{margin-left:auto;font-size:12px;color:#7a869a}
main{padding:16px 24px 40px}
.industry{background:white;border-radius:8px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.industry-h{padding:12px 16px;background:#f8fafc;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;flex-wrap:wrap}
.industry-h:hover{background:#eef2f6}
.industry-h .arr{transition:transform .15s;font-size:11px;color:#7a869a;flex-shrink:0}
.industry.closed .arr{transform:rotate(-90deg)}
.industry.closed .industry-body{display:none}
.industry-h .name{font-weight:600;font-size:15px;cursor:pointer}
.industry-h .name:hover{color:#00b894}
.industry-h .meta{font-size:11px;color:#7a869a}
.industry-body{padding:8px 16px 14px}
.subgroup{margin-top:10px}
.subgroup-h{font-size:12px;font-weight:600;color:#7a869a;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 6px;padding:4px 0;border-bottom:1px dashed #e5e9f0;display:flex;align-items:center;gap:6px}
.subgroup-h .icon{font-size:14px}
.companies{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.card{padding:8px 11px;background:#fafbfc;border:1px solid #e5e9f0;border-radius:6px;font-size:13px;display:flex;flex-direction:column;gap:3px;transition:all .12s;position:relative}
.card:hover{border-color:#00b894;background:white;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,184,148,.15)}
.card.tw{border-left:3px solid #00b894}
.card.leader{box-shadow:0 0 0 1px #f59e0b inset}
.card .row1{display:flex;align-items:center;gap:6px}
.card .flag{font-size:14px;flex-shrink:0}
.card .nm{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.card .nm:hover{color:#00b894;text-decoration:underline}
.card .code{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#7a869a;background:#eef2f6;padding:1px 5px;border-radius:3px;flex-shrink:0}
.card .star{color:#f59e0b;font-size:12px;flex-shrink:0}
.card .mv{font-size:11px;color:#0984e3;font-weight:600}
.card .price{font-size:11px;color:#7a869a;margin-left:6px}
.card .mkt{font-size:10px;color:#7a869a;background:#f0f3f6;padding:1px 5px;border-radius:3px;display:inline-block;flex-shrink:0}
.card .mkt.otc{color:#7c3aed;background:#f3e8ff}
.card .mkt.rotc{color:#dc2626;background:#fee2e2}
.returns{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:3px}
.ret{font-size:10px;padding:3px 4px;border-radius:3px;text-align:center;font-family:ui-monospace,Menlo,monospace;font-weight:600;line-height:1.1}
.ret .lbl{font-size:8.5px;font-weight:400;color:#222}
.returns .ret .lbl{display:block;margin-bottom:1px}
.median .ret .lbl{margin-right:3px}
.ret.posXS{background:#fff5f5;color:#7a1818}
.ret.posS{background:#ffe4e4;color:#8a1c1c}
.ret.pos{background:#fcc;color:#991b1b}
.ret.posL{background:#f87171;color:white}
.ret.posXL{background:#dc2626;color:white}
.ret.negXS{background:#f0fdf4;color:#14532d}
.ret.negS{background:#dcfce7;color:#166534}
.ret.neg{background:#bbf7d0;color:#15803d}
.ret.negL{background:#34d399;color:white}
.ret.negXL{background:#059669;color:white}
.ret.flat{background:#f0f3f6;color:#444}
.ret.na{background:#fafbfc;color:#cbd5e1}
.themes{font-size:10px;color:#7a869a;margin-top:2px;display:flex;flex-wrap:wrap;gap:3px}
.theme-tag,.ind-tag,.leader-tag{padding:1px 4px;border-radius:2px;cursor:pointer;transition:all .12s}
.theme-tag{background:#fff3cd;color:#856404}
.theme-tag:hover{background:#fde68a;box-shadow:0 0 0 1px #f59e0b}
.ind-tag{background:#cfe8ff;color:#0c5cb5}
.ind-tag:hover{background:#a3d3ff;box-shadow:0 0 0 1px #0c5cb5}
.leader-tag{background:#fef3c7;color:#92400e}
.leader-tag:hover{background:#fde68a;box-shadow:0 0 0 1px #92400e}
.median{display:flex;gap:4px;flex-wrap:wrap;font-size:11px;align-items:center}
.median-lbl{color:#7a869a;font-weight:600;margin-right:4px}
.empty{text-align:center;padding:40px;color:#7a869a}
.footer{text-align:center;padding:20px;color:#7a869a;font-size:11px}
@media (max-width:600px){
  header{padding:14px 16px}.stats,.filters,main,.heatmap-wrap{padding-left:12px;padding-right:12px}
  .filters input{min-width:0;flex:1}
  .companies{grid-template-columns:1fr}
  .returns{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<script>
const D=JSON.parse(document.getElementById('data').textContent);
const FL=D.flags;
const P=D.periods;
const PLBL={'1D':'天','5D':'周','30D':'月','90D':'季','180D':'半年','365D':'1Y','1095D':'3Y'};
const root=document.getElementById('root');
const F={
  q:'', country:'', mkt:'', tw:false, intl:false, leader:false, hasMv:false, hasRet:false,
  group:'mm',  // 'mm' | 'fl' | 'tsf'
  period:'30D',
  sortBy:'ret',  // 'ret' | 'mv'
  expand:false,
  hmCollapsed:false,
};

function fmt(n){return n||n===0?n.toLocaleString('zh-TW',{maximumFractionDigits:0}):'';}
function median(arr){if(!arr.length)return null;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}

function retClass(v, period){
  if(v===null||v===undefined) return 'ret na';
  // 5 級漸層 (絕對值越大顏色越深)
  const a=Math.abs(v);
  let lvl;
  if(a<1) lvl='XS';
  else if(a<3) lvl='S';
  else if(a<10) lvl='';
  else if(a<25) lvl='L';
  else lvl='XL';
  if(v>0) return 'ret pos'+lvl;
  if(v<0) return 'ret neg'+lvl;
  return 'ret flat';
}
function tileClass(v){
  if(v===null||v===undefined) return 'tile na';
  if(v>=30) return 'tile posXL';
  if(v>=10) return 'tile posL';
  if(v>0) return 'tile pos';
  if(v<=-30) return 'tile negXL';
  if(v<=-10) return 'tile negL';
  if(v<0) return 'tile neg';
  return 'tile flat';
}

function rowKeys(r){
  // 取得 row 在當前分組維度下的所有 group keys
  if(F.group==='mm') return r.mm_subcats||[];
  if(F.group==='fl') return r.finlab_industry?[r.finlab_industry]:[];
  if(F.group==='tsf') return r.tsf_themes||[];
  return [];
}

function filterRows(){
  return D.rows.filter(r=>{
    // 永遠隱藏無代碼或無股價資料的 (未上市公司/macromicro資料不全/yfinance抓不到)
    if(!r['代碼'] || !r.ret) return false;
    if(F.country && r['上市地']!==F.country) return false;
    if(F.mkt && r['市場別']!==F.mkt) return false;
    if(F.tw && r['上市地']!=='台灣') return false;
    if(F.intl && r['上市地']==='台灣') return false;
    if(F.leader && !r['是否代表']) return false;
    if(F.hasMv && !r.mv) return false;
    if(F.hasRet && !r.ret) return false;
    if(F.q){
      const q=F.q.toLowerCase();
      const hay=(r['公司名']+r['代碼']+(r['finlab_industry']||'')+(r.mm_subcats||[]).join(' ')+(r.tsf_themes||[]).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function buildStats(){
  const rows=D.rows;
  const visible=filterRows();
  let html='';
  html+=`<div class="stat"><span class="v">${rows.length}</span><span class="l">總個股</span></div>`;
  html+=`<div class="stat"><span class="v">${rows.filter(r=>r.上市地==='台灣').length}</span><span class="l">🇹🇼 台股</span></div>`;
  html+=`<div class="stat"><span class="v">${rows.filter(r=>r.上市地!=='台灣').length}</span><span class="l">🌐 國際</span></div>`;
  html+=`<div class="stat"><span class="v">${rows.filter(r=>r.是否代表).length}</span><span class="l">★ 代表廠商</span></div>`;
  html+=`<div class="stat"><span class="v">${rows.filter(r=>r.ret).length}</span><span class="l">有漲跌幅</span></div>`;
  html+=`<div class="stat"><span class="v">${visible.length}</span><span class="l">當前篩選</span></div>`;
  document.getElementById('stats').innerHTML=html;
}

function buildHeatmap(){
  // 只渲染分組+期間按鈕列，不再有熱力 tiles
  const periodBtns=P.map(p=>`<button data-p="${p}" class="${F.period===p?'on':''}">${PLBL[p]}</button>`).join('');
  const groupBtns=[
    {k:'mm',l:'🌐 全球子產業 ('+D.mm_subcats.length+')'},
    {k:'fl',l:'🇹🇼 FinLab 產業 ('+D.finlab.length+')'},
    {k:'tsf',l:'🏷️ twstockflow 主題 ('+D.tsf.length+')'},
  ].map(g=>`<button data-g="${g.k}" class="${F.group===g.k?'on':''}">${g.l}</button>`).join('');
  let html=`<div class="hm-header" style="margin:0">
    <span class="hm-title">分組:</span>
    <div class="hm-group">${groupBtns}</div>
    <span style="color:#7a869a;font-size:12px">期間:</span>
    <div class="hm-period">${periodBtns}</div>
  </div>`;
  document.getElementById('hmwrap').innerHTML=html;
  document.querySelectorAll('.hm-period button').forEach(b=>b.onclick=()=>{F.period=b.dataset.p;F.sortBy='ret';F.q='';buildAll();});
  document.querySelectorAll('.hm-group button').forEach(b=>b.onclick=()=>{F.group=b.dataset.g;F.q='';buildAll();});
}

function buildFilters(){
  const periodOpts=P.map(p=>`<option value="${p}" ${F.period===p?'selected':''}>${PLBL[p]}</option>`).join('');
  let h='';
  h+=`<input id="q" type="search" placeholder="搜尋公司名 / 代碼 / 產業 / 主題…" value="${F.q}">`;
  h+=`<select id="country"><option value="">全部上市地</option>${D.countries.map(c=>`<option value="${c}" ${F.country===c?'selected':''}>${(FL[c]||'')+' '+c}</option>`).join('')}</select>`;
  h+=`<select id="mkt"><option value="">全部市場別</option>${D.markets.map(m=>`<option ${F.mkt===m?'selected':''}>${m}</option>`).join('')}</select>`;
  h+=`<button id="tw" class="${F.tw?'on':''}">🇹🇼 僅台股</button>`;
  h+=`<button id="intl" class="${F.intl?'on':''}">🌐 僅國際</button>`;
  h+=`<button id="leader" class="${F.leader?'on':''}">★ 僅代表</button>`;
  h+=`<button id="hasMv" class="${F.hasMv?'on':''}">有市值</button>`;
  h+=`<select id="sortBy"><option value="ret" ${F.sortBy==='ret'?'selected':''}>排序: 漲跌幅</option><option value="mv" ${F.sortBy==='mv'?'selected':''}>排序: 市值</option></select>`;
  h+=`<button id="expand" class="${F.expand?'on':''}">${F.expand?'收合全部':'展開全部'}</button>`;
  h+=`<span class="count" id="count"></span>`;
  document.getElementById('filters').innerHTML=h;
  document.getElementById('q').oninput=e=>{F.q=e.target.value;buildStats();renderMain();};  // 不重建 filter 避免中文輸入法被打斷
  document.getElementById('country').onchange=e=>{F.country=e.target.value;buildAll();};
  document.getElementById('mkt').onchange=e=>{F.mkt=e.target.value;buildAll();};
  document.getElementById('tw').onclick=()=>{F.tw=!F.tw;if(F.tw)F.intl=false;buildAll();};
  document.getElementById('intl').onclick=()=>{F.intl=!F.intl;if(F.intl)F.tw=false;buildAll();};
  document.getElementById('leader').onclick=()=>{F.leader=!F.leader;buildAll();};
  document.getElementById('hasMv').onclick=()=>{F.hasMv=!F.hasMv;buildAll();};
  document.getElementById('sortBy').onchange=e=>{F.sortBy=e.target.value;renderMain();};
  document.getElementById('expand').onclick=()=>{F.expand=!F.expand;renderMain();};
}

function renderReturns(rec){
  if(!rec.ret) return '';
  let h='<div class="returns">';
  for(const p of P){
    const v=rec.ret[p];
    const txt=v===undefined||v===null?'-':(v>0?'+':'')+v.toFixed(1)+'%';
    h+=`<div class="${retClass(v,p)}"><span class="lbl">${PLBL[p]}</span>${txt}</div>`;
  }
  h+='</div>';
  return h;
}

function renderMedianLine(items){
  let h='<div class="median"><span class="median-lbl">中位</span>';
  for(const p of P){
    const vs=items.map(r=>r.ret&&r.ret[p]!==undefined?r.ret[p]:null).filter(v=>v!==null);
    const v=vs.length?median(vs):null;
    const txt=v===null?'—':(v>0?'+':'')+v.toFixed(1)+'%';
    h+=`<span class="${retClass(v,p)}" style="padding:1px 4px;font-size:10px"><span class="lbl">${PLBL[p]}</span>${txt}</span>`;
  }
  h+='</div>';
  return h;
}

function renderCard(r){
  const isTW=r['上市地']==='台灣';
  const flag=FL[r['上市地']]||'⚫';
  const star=r['是否代表']?'<span class="star">★</span>':'';
  const codeBox=r['代碼']?`<span class="code">${r['代碼']}</span>`:'';
  const mktBox=isTW&&r['市場別']?`<span class="${'mkt'+(r['市場別']==='上櫃'?' otc':r['市場別']==='興櫃'?' rotc':'')}">${r['市場別']}</span>`:'';
  const mv=r.mv?`<span class="mv">市值 ${fmt(r.mv)} 億</span>`:'';
  const price=r.price?`<span class="price">收盤 ${r.price}</span>`:'';
  const mvLine=mv||price?`<div>${mv}${price}</div>`:'';
  const tags=[];
  if(r.finlab_industry) tags.push(`<span class="ind-tag" onclick="event.stopPropagation();filterByTag('${r.finlab_industry.replace(/'/g,"\\'")}','fl')">${r.finlab_industry}</span>`);
  // 只有 official mm 代表才打 ★, mapping 補位的不打
  const officialSubs=r.mm_subcats_official||(r._src==='intl'?(r.mm_subcats||[]):[]);
  officialSubs.forEach(s=>tags.push(`<span class="leader-tag" onclick="event.stopPropagation();filterByTag('${s.replace(/'/g,"\\'")}','mm')">★ ${s}</span>`));
  (r.tsf_themes||[]).forEach(t=>tags.push(`<span class="theme-tag" onclick="event.stopPropagation();filterByTag('${t.replace(/'/g,"\\'")}','tsf')">${t}</span>`));
  const tagsHtml=tags.length?`<div class="themes">${tags.join('')}</div>`:'';
  return `<div class="card${isTW?' tw':''}${r.是否代表?' leader':''}">
    <div class="row1">${isTW?star:''}<span class="flag">${flag}</span><span class="nm" onclick="filterByTag('${r['公司名'].replace(/'/g,"\\'")}')">${r['公司名']}</span>${codeBox}${mktBox}</div>
    ${mvLine}${renderReturns(r)}${tagsHtml}
  </div>`;
}

function renderMain(){
  const rows=filterRows();
  document.getElementById('count').textContent=`顯示 ${rows.length} / ${D.rows.length}`;

  // group by current dimension
  const groups={};
  rows.forEach(r=>{
    const keys=rowKeys(r);
    if(!keys.length){
      // 無分類的 row: 放 "其他" (例如 FinLab 模式下國際股)
      groups['(無此分類)']=groups['(無此分類)']||[];
      groups['(無此分類)'].push(r);
      return;
    }
    keys.forEach(k=>{
      groups[k]=groups[k]||[];
      groups[k].push(r);
    });
  });

  if(!Object.keys(groups).length){
    root.innerHTML='<div class="empty">沒有符合條件的資料</div>';
    return;
  }

  // sort groups
  let names=Object.keys(groups);
  if(F.sortBy==='ret'){
    names.sort((a,b)=>{
      const ma=median(groups[a].map(r=>r.ret&&r.ret[F.period]).filter(v=>v!==undefined&&v!==null))??-1e9;
      const mb=median(groups[b].map(r=>r.ret&&r.ret[F.period]).filter(v=>v!==undefined&&v!==null))??-1e9;
      return mb-ma;
    });
  } else {
    names.sort((a,b)=>{
      const sa=groups[a].reduce((s,r)=>s+(r.mv||0),0);
      const sb=groups[b].reduce((s,r)=>s+(r.mv||0),0);
      return sb-sa;
    });
  }
  // 完全符合搜尋字 → 只顯示該 group, 其他不要
  if(F.q){
    const ql=F.q.toLowerCase().trim();
    const exact=names.filter(n=>n.toLowerCase()===ql);
    if(exact.length){
      names=exact;
    }
  }

  let html='';
  const sortFn = F.sortBy==='ret'
    ? (a,b)=>((b.ret&&b.ret[F.period]!==undefined?b.ret[F.period]:-1e9) - (a.ret&&a.ret[F.period]!==undefined?a.ret[F.period]:-1e9))
    : (a,b)=>((b.mv||-1)-(a.mv||-1));
  for(const name of names){
    const items=groups[name];
    // 拆 macromicro 代表 vs 其他相關
    const reps=items.filter(r=>r['是否代表']).sort(sortFn);
    const others=items.filter(r=>!r['是否代表']).sort(sortFn);
    const repsIntl=reps.filter(r=>r['上市地']!=='台灣').length;
    const repsTw=reps.filter(r=>r['上市地']==='台灣').length;
    const cls=F.expand||F.q?'industry':'industry closed';
    html+=`<section class="${cls}">
      <div class="industry-h" onclick="if(event.target.tagName!=='SPAN')this.parentElement.classList.toggle('closed')">
        <span class="arr">▼</span>
        <span class="name" onclick="event.stopPropagation();filterByTag('${name.replace(/'/g,"\\'")}')">${name}</span>
        <span class="meta">${items.length} 檔 · ★${reps.length} / 其他${others.length}</span>
        ${renderMedianLine(items)}
      </div>
      <div class="industry-body">`;
    if(reps.length){
      const tag=repsIntl&&repsTw?`(🌐${repsIntl} / 🇹🇼${repsTw})`:repsIntl?`(🌐${repsIntl})`:`(🇹🇼${repsTw})`;
      html+=`<div class="subgroup"><div class="subgroup-h"><span class="icon">★</span>macromicro 代表廠商 ${reps.length} ${tag}</div><div class="companies">${reps.map(renderCard).join('')}</div></div>`;
    }
    if(others.length){
      html+=`<div class="subgroup"><div class="subgroup-h" style="opacity:.7"><span class="icon">·</span>其他相關 (${others.length})</div><div class="companies">${others.map(renderCard).join('')}</div></div>`;
    }
    html+=`</div></section>`;
  }
  root.innerHTML=html;
}

function buildAll(){
  buildStats();
  buildHeatmap();
  buildFilters();
  renderMain();
}

function filterByTag(txt, mode){
  txt=txt.replace(/^★ /,'').trim();
  // 帶 mode 的話切到對應分組 (例如 twstockflow 主題 → tsf, FinLab 產業 → fl, macromicro 子產業 → mm)
  if(mode && ['mm','fl','tsf'].includes(mode)) F.group=mode;
  F.q=txt;
  const inp=document.getElementById('q');
  if(inp) inp.value=txt;
  window.scrollTo({top:0,behavior:'smooth'});
  buildAll();
}
window.filterByTag=filterByTag;

buildAll();
</script>
</body>
</html>
